 <!-- CHANGELOG HEADER -->
    <section class="models-header1">
        <h2>Changelog</h2>
        <div class="divider">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </section>

    <!-- CHANGELOG LISTE -->
    <section class="changelog" id="logContainer"></section>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            let logs = JSON.parse(localStorage.getItem("logs") || "[]");
            let container = document.getElementById("logContainer");

            logs.slice().reverse().forEach(log => {
                container.innerHTML += `
                    <div class="log-card">
                        <h3>${log.date} - ${log.category}</h3>
                        <ul>
                            <li><strong>${log.title}</strong></li>
                            <li>${log.text}</li>
                        </ul>
                    </div>
                `;
            });
        });
    </script>
